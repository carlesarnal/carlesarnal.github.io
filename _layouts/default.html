<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="site-nav">
    <div class="nav-container">
      <a href="{{ '/' | relative_url }}" class="nav-logo">Carles Arnal</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/blog' | relative_url }}">Deep Dives</a>
        <a href="{{ '/projects' | relative_url }}">Projects</a>
        <a href="https://github.com/carlesarnal" target="_blank">GitHub</a>
      </div>
    </div>
  </nav>

  <main class="site-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <p>Carles Arnal &middot; Principal Software Engineer at IBM &middot; Barcelona</p>
      <p><a href="https://github.com/carlesarnal">GitHub</a></p>
    </div>
  </footer>
</body>
</html>
